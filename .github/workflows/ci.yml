name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -e ".[dev]"
      - run: ruff check videoagent tests
      - run: pytest -q

  go:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: pipeline } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
          cache-dependency-path: pipeline/go.sum
      - run: go vet ./...
      - run: go build ./...
      - run: go test -race ./...

  docker:
    runs-on: ubuntu-latest
    needs: [python, go]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: videoagent:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
